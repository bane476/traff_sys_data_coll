name: 5-Minute Traffic Collector

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# --- THE FIX FOR EXIT CODE 128 ---
permissions:
  contents: write  # Allows the bot to push the .jsonl file back to the repo

jobs:
  collect_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python github_collector.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Traffic-Bot"
          git config --global user.email "actions@github.com"
          # Check if the file exists to avoid errors on first run
          git add traffic_data_history.jsonl || true 
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data collection: $(date)" && git push)
